title: "Extract metrics logger interface"
repo: flyingrobots/graft
commit: 6be695f
prompt: |
  The MetricsLogger class in src/metrics/logger.ts is a concrete
  implementation. Extract a MetricsPort interface in
  src/ports/metrics.ts that defines the logging contract, then
  make MetricsLogger implement it.

  The interface should have a log() method matching the current
  signature. Update any code that references MetricsLogger directly
  to use the port interface where appropriate (dependency injection
  sites). Keep the concrete class for the Node adapter.

  All existing tests must pass. Add a test that verifies the
  interface contract.
