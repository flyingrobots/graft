id: T06
pair: P03
title: "Add Python language detection"
repo: flyingrobots/graft
commit: 6be695f
prompt: |
  Add Python language detection to graft's parser. The detectLang
  function in src/parser/lang.ts should recognize .py files and
  return "python" as the language identifier.

  Note: tree-sitter Python grammar is not yet available, so
  outline extraction will not work for Python files. The detection
  should return the language but extractOutline should gracefully
  handle unsupported languages. Add tests for detection and for
  the graceful fallback when outline extraction is attempted on
  a .py file.
acceptance:
  automated:
    - "pnpm test exits 0"
    - "pnpm lint exits 0"
    - "grep -q 'python' src/parser/lang.ts"
    - "grep -rq '\\.py' test/"
  manual: null
difficulty: S
duration_band: "10-25 min"
read_profile: "3-6 files, 1 medium (outline.ts)"
category: feature
negative_control: false
