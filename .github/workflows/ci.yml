name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  WESLEY_CLI_VERSION: "0.0.5"
  WESLEY_CLI_REVISION: "ca2755ff631abb28947bca006d25646828886e19"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6.0.9
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8
        id: cache-wesley
        with:
          path: ~/.local/bin/wesley-${{ env.WESLEY_CLI_VERSION }}
          key: ${{ runner.os }}-wesley-cli-${{ env.WESLEY_CLI_VERSION }}-${{ env.WESLEY_CLI_REVISION }}
      - name: Install Wesley CLI
        if: steps.cache-wesley.outputs.cache-hit != 'true'
        run: |
          cargo install \
            --git https://github.com/flyingrobots/wesley.git \
            --rev "$WESLEY_CLI_REVISION" \
            --locked \
            --root "$RUNNER_TEMP/wesley" \
            wesley-cli
          mkdir -p "$HOME/.local/bin"
          cp "$RUNNER_TEMP/wesley/bin/wesley" "$HOME/.local/bin/wesley-$WESLEY_CLI_VERSION"
      - name: Configure Wesley CLI
        run: |
          chmod +x "$HOME/.local/bin/wesley-$WESLEY_CLI_VERSION"
          echo "WESLEY_BIN=$HOME/.local/bin/wesley-$WESLEY_CLI_VERSION" >> "$GITHUB_ENV"
      - run: pnpm schema:structural-history:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
